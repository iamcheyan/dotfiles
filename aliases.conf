# gitui / delta 工作流
git:ui() {
    command gitui "$@"
}

git:delta:init() {
    if ! command -v delta >/dev/null 2>&1; then
        echo "delta 未安装，先重载 zsh 或执行: zinit update dandavison/delta"
        return 1
    fi

    git config --global core.pager delta
    git config --global interactive.diffFilter 'delta --color-only'
    git config --global delta.navigate true
    git config --global delta.side-by-side true
    git config --global delta.line-numbers true
    git config --global merge.conflictStyle zdiff3

    echo "✓ 已启用 delta 作为全局 Git pager"
}

git:diff() {
    if command -v delta >/dev/null 2>&1; then
        GIT_PAGER=delta git diff "$@"
    else
        git diff "$@"
    fi
}

git:diff:staged() {
    if command -v delta >/dev/null 2>&1; then
        GIT_PAGER=delta git diff --staged "$@"
    else
        git diff --staged "$@"
    fi
}

git:log:patch() {
    if command -v delta >/dev/null 2>&1; then
        GIT_PAGER=delta git log -p "$@"
    else
        git log -p "$@"
    fi
}

# 增强版 git:init：初始化仓库并生成完善的 .gitignore
git:init() {
    # 1. 执行原有的初始化逻辑
    easygit init "$@"

    # 2. 生成 .gitignore 模板
    cat << 'EOF' > .gitignore
# === 系统文件 ===
.DS_Store
Thumbs.db
.Spotlight-V100
.Trashes

# === 编辑器/IDE ===
.vscode/
.idea/
*.swp
*.swo
*~
.project
.settings/

# === 编程语言 ===
# Node.js
node_modules/
npm-debug.log*
yarn-debug.log*
yarn-error.log*
.pnpm-debug.log*

# Python
__pycache__/
*.py[cod]
*$py.class
.venv/
env/
venv/
.env

# Rust
target/
Cargo.lock

# Go
bin/
pkg/

# === AI/Agent 相关 (按要求包含 AGENTS.md) ===
AGENTS.md
GEMINI.md
.claude/
.gemini/

# === 临时文件 ===
tmp/
dist/
build/
out/
logs/
*.log
EOF
    echo "✓ 已初始化 Git 仓库并生成 .gitignore 模板 (包含 ANGENS.md)"
}


