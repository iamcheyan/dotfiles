# alias
alias ea="nvim $HOME/dotfiles/aliases.conf"
alias rp="realpath"
alias cr="clear"

# function
reload() {
  chezmoi init
  chezmoi apply
  exec zsh
}

# dotfiles 管理エイリアス
alias dotlink="bash ${HOME}/dotfiles/dotlink/dotlink"

# git
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi
  git add .
  git commit "$@"
}

# vifm-sshfs
alias vssh='$HOME/dotfiles/plugins/sshfs/vifm-sshfs.sh'

# ranger
r() {
  local tmpfile
  tmpfile="$(mktemp)"

  ranger --choosedir="$tmpfile" "${@:-$PWD}"

  if [ -f "$tmpfile" ]; then
    local newdir
    newdir="$(cat "$tmpfile")"
    [ -d "$newdir" ] && cd "$newdir"
    rm -f "$tmpfile"
  fi
}

# zellij
source $HOME/dotfiles/plugins/zellij/config.conf

# agent
alias cx="$HOME/dotfiles/agent/codex.sh"
alias cc="$HOME/dotfiles/agent/claude-code.sh"
alias grok="$HOME/dotfiles/agent/grok.sh"
alias pi="$HOME/dotfiles/agent/pi.sh"
alias gemini="$HOME/dotfiles/agent/antigravity.sh"
alias mimo="$HOME/dotfiles/agent/mimo.sh"
alias copilot="$HOME/dotfiles/agent/copilot.sh"
alias cur="$HOME/dotfiles/agent/cursor.sh"
alias kiro="$HOME/dotfiles/agent/kiro.sh"
alias aq="$HOME/dotfiles/agent/agent-quota.sh"
