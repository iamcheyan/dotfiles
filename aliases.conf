alias ea='cd ${HOME}/chezmoi/dot_config/dotfiles/aliases && nvim ${HOME}/chezmoi/dot_config/dotfiles/aliases/a.conf'
alias rd="chezmoi apply && exec zsh"

alias extract="bash ${HOME}/dotfiles/scripts/utils/extract.sh"
alias random:string="bash ${HOME}/dotfiles/scripts/utils/random_string.sh"
alias git:clean="bash ${HOME}/dotfiles/scripts/dev/git_clean.sh"

alias backup:config="bash ${HOME}/.config/dotfiles/scripts/system/backup_config.sh"
alias disk:usage="bash ${HOME}/dotfiles/scripts/system/disk_usage.sh"
alias find:large="bash ${HOME}/dotfiles/scripts/system/find_large_files.sh"
alias port:check="bash ${HOME}/dotfiles/scripts/system/port_check.sh"
