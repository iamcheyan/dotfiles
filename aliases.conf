# alias
alias ea="nvim $HOME/dotfiles/aliases.conf"
alias rp="realpath"
alias gm="gemini"
alias oc="$HOME/.opencode/bin/opencode"

# function
reload() {
  chezmoi apply
  exec zsh
}

g() { git "$@"; }
cx() { nvm use 20 && command codex }

# dotfiles 管理エイリアス
alias dotlink="bash ${HOME}/dotfiles/dotlink/dotlink"
alias dotsync="bash ${HOME}/dotfiles/dotlink/dotsync"
alias gitpushpat="bash ${HOME}/dotfiles/scripts/dev/git_push_with_pat_fallback.sh"

# dotpush
dp() {
  # echo "🧠 push dotfiles..."
  bash ${HOME}/dotfiles/scripts/dev/push_dotfiles.sh "$@"

  if [ -d "${HOME}/chezmoi/.git" ]; then
    local branch
    echo "push chezmoi..."
    git -C "${HOME}/chezmoi" add -A
    if [ $# -gt 0 ]; then
      git -C "${HOME}/chezmoi" commit -m "$*" >/dev/null 2>&1 || true
    else
      git -C "${HOME}/chezmoi" commit -m "chore: update chezmoi" >/dev/null 2>&1 || true
    fi
    branch=$(git -C "${HOME}/chezmoi" branch --show-current 2>/dev/null)
    if [ -z "$branch" ]; then
      branch="main"
    fi
    bash "${HOME}/dotfiles/scripts/dev/git_push_with_pat_fallback.sh" "${HOME}/chezmoi" "$branch" origin
  fi
}

# git
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi
  git add .
  git commit "$@"
}

# VIM DIFF

wdiff() {
  echo "Paste LEFT, Ctrl-D when done:"
  left=$(cat)
  echo "Paste RIGHT, Ctrl-D when done:"
  right=$(cat)
  nvim -d <(echo "$left") <(echo "$right")
}
