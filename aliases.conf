# fnm
eval "$(fnm env --use-on-cd)"

# alias
alias ea="nvim $HOME/dotfiles/aliases.conf"
alias rp="realpath"
alias cr="clear"

# function
reload() {
  chezmoi init
  chezmoi apply
  exec zsh
}

# dotfiles 管理エイリアス
alias dotlink="bash ${HOME}/dotfiles/dotlink/dotlink"

# git
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi
  git add .
  git commit "$@"
}

# vifm-sshfs
alias vssh='$HOME/dotfiles/plugins/sshfs/vifm-sshfs.sh'

# ls > eza
if command -v eza >/dev/null 2>&1; then
    alias l="eza --icons --group-directories-first --sort=modified --reverse"
    alias ll="eza -lh --icons --group-directories-first --git --sort=modified --reverse"
    alias la="eza -a --icons --group-directories-first --sort=modified --reverse"
fi

# ranger
r() {
  local tmpfile
  tmpfile="$(mktemp)"

  ranger --choosedir="$tmpfile" "${@:-$PWD}"

  if [ -f "$tmpfile" ]; then
    local newdir
    newdir="$(cat "$tmpfile")"
    [ -d "$newdir" ] && cd "$newdir"
    rm -f "$tmpfile"
  fi
}

# zellij
source $HOME/dotfiles/plugins/zellij/config.conf

# agent
alias cx="$HOME/dotfiles/agent/codex.sh"
alias cc="$HOME/dotfiles/agent/claude-code.sh"
alias grok="$HOME/dotfiles/agent/grok.sh"
alias mypi="$HOME/dotfiles/agent/pi.sh"
alias gemini="$HOME/dotfiles/agent/antigravity.sh"
alias mimo="$HOME/dotfiles/agent/mimo.sh"

# https://github.com/3ddruck12/wine-adobe-installers-Photoshop-for-Linux---Installer
alias copilot="$HOME/dotfiles/agent/copilot.sh"
alias kiro="$HOME/dotfiles/agent/kiro.sh"
alias aq="$HOME/dotfiles/agent/agent-quota.sh"
