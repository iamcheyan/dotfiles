# alias
alias ea="nvim $HOME/dotfiles/aliases.conf"
alias rp="realpath"
alias cr="clear"
alias lsk="ls --color=auto | grep --color=auto"

# function
reload() {
  chezmoi init
  chezmoi apply
  exec zsh
}

g() { git "$@"; }
alias ge="git clone"
alias gl='git log --oneline --graph --all --decorate'
gbr() {
  git for-each-ref refs/remotes/"$1" --format='%(refname:short)'
}

# agent
alias cx="$HOME/dotfiles/agent/codex.sh"
alias cc="$HOME/dotfiles/agent/claude-code.sh"
alias grok="$HOME/dotfiles/agent/grok.sh"
alias pi="$HOME/dotfiles/agent/pi.sh"

# dotfiles 管理エイリアス
alias dotlink="bash ${HOME}/dotfiles/dotlink/dotlink"

# dotpush
dp() {
  bash "${HOME}/dotfiles/scripts/dev/push_dotfiles.sh" "${HOME}/dotfiles" "dotfiles" "$@"

  if [ -d "${HOME}/chezmoi/.git" ]; then
    echo ""
    bash "${HOME}/dotfiles/scripts/dev/push_dotfiles.sh" "${HOME}/chezmoi" "chezmoi" "$@"
  fi
}

# git
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi
  git add .
  git commit "$@"
}

# Hunk wrappers
alias hunk="$HOME/dotfiles/plugins/hunk/hunk.sh"
alias hdiff='$HOME/dotfiles/plugins/hunk/hunk.sh diff'
alias hshow='$HOME/dotfiles/plugins/hunk/hunk.sh show'

# vifm-sshfs
alias vssh='$HOME/dotfiles/plugins/sshfs/vifm-sshfs.sh'

# ranger
r() {
  local tmpfile
  tmpfile="$(mktemp)"

  ranger --choosedir="$tmpfile" "${@:-$PWD}"

  if [ -f "$tmpfile" ]; then
    local newdir
    newdir="$(cat "$tmpfile")"
    [ -d "$newdir" ] && cd "$newdir"
    rm -f "$tmpfile"
  fi
}

# zellij
source $HOME/dotfiles/plugins/zellij/config.conf
