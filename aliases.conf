# Markdown & 图片预览
if command -v glow >/dev/null 2>&1; then
    alias md="glow"
fi
if command -v mdcat >/dev/null 2>&1; then
    # mi: 增强型 Markdown 预览，适配 Zellij
    mi() {
        if [[ -n "$ZELLIJ" ]]; then
            # 在 Zellij 内，mdcat 可能会降级
            mdcat "$@"
        else
            mdcat "$@"
        fi
    }
fi
if command -v viu >/dev/null 2>&1; then
    # img: 智能识别环境显示图片
    img() {
        if [[ -n "$ZELLIJ" ]]; then
            # 在 Zellij 内，强制使用 Sixel (如果失败会自动回退到块字符)
            viu -s "$@"
        else
            viu "$@"
        fi
    }
fi

