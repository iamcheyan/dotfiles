# alias
alias ea="nvim $HOME/dotfiles/aliases.conf"
alias rp="realpath"
alias gm="gemini"
alias oc="$HOME/.opencode/bin/opencode"

# agents (MiMo API, 独立于用户自己的安装)
alias app:codex="bash $HOME/dotfiles/agents/codex/codex"
alias app:cline="bash $HOME/dotfiles/agents/cline/cline"
alias app:opencode="bash $HOME/dotfiles/agents/opencode/opencode"
alias app:claudecode="bash $HOME/dotfiles/agents/claude-code/claudecode"

# function
reload() {
  chezmoi init
  chezmoi apply
  exec zsh
}

g() { git "$@"; }
cx() { nvm use 20 && command codex }

# dotfiles 管理エイリアス
alias dotlink="bash ${HOME}/dotfiles/dotlink/dotlink"
alias dotsync="bash ${HOME}/dotfiles/dotlink/dotsync"
alias gitpushpat="bash ${HOME}/dotfiles/scripts/dev/git_push_with_pat_fallback.sh"

# dotpush
dp() {
  bash "${HOME}/dotfiles/scripts/dev/push_dotfiles.sh" "${HOME}/dotfiles" "dotfiles" "$@"

  if [ -d "${HOME}/chezmoi/.git" ]; then
    echo ""
    bash "${HOME}/dotfiles/scripts/dev/push_dotfiles.sh" "${HOME}/chezmoi" "chezmoi" "$@"
  fi
}

# git
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi
  git add .
  git commit "$@"
}

# VIM DIFF

wdiff() {
  echo "Paste LEFT, Ctrl-D when done:"
  left=$(cat)
  echo "Paste RIGHT, Ctrl-D when done:"
  right=$(cat)
  nvim -d <(echo "$left") <(echo "$right")
}
