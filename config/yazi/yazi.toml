[opener]
edit = [
	{ run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]

[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
# 这里的配置确保你可以直接在终端打开图片预览
preview_method = "kitty"
