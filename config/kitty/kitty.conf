# ===== Font =====
font_family Adwaita Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0
adjust_line_height 100%

# ===== Wayland =====
linux_display_server wayland

# ===== Colors (Zellij Green/Dracula) =====
background #000000
foreground #f8f8f2
cursor     #50fa7b
selection_background #44475a
selection_foreground #f8f8f2

color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# ===== Clipboard & Keybindings (GUI-style) =====
copy_on_select yes
map ctrl+c copy_to_clipboard
# Smart paste: if the clipboard holds an image, save it to /tmp and paste its
# PATH (terminals can't render image data); otherwise paste text normally.
# Logic lives in OMD; text is injected via `kitty @ send-text` (no Ctrl+V
# re-injection, so this bind cannot retrigger itself).
map ctrl+v launch --type=background ~/.config/omd/bin/omd-kitty-smart-paste

# Send SIGINT (Ctrl+C signal) via Shift when needed
map ctrl+shift+c send_text all \x03

# Pane mode (Ctrl+p ...)
# map ctrl+p>h neighboring_window left
# map ctrl+p>j neighboring_window bottom
# map ctrl+p>k neighboring_window top
# map ctrl+p>l neighboring_window right
# map ctrl+p>p nth_window -1
# map ctrl+p>n launch --location=neighbor
# map ctrl+p>d launch --location=hsplit
# map ctrl+p>r launch --location=vsplit
# map ctrl+p>x close_window
# map ctrl+p>f toggle_layout stack

# Tab mode (Ctrl+t ...)
# map ctrl+t>h previous_tab
# map ctrl+t>l next_tab
# map ctrl+t>n new_tab
# map ctrl+t>x close_tab
# map ctrl+t>r set_tab_title
# map ctrl+t>1 goto_tab 1
# map ctrl+t>2 goto_tab 2
# map ctrl+t>3 goto_tab 3
# map ctrl+t>4 goto_tab 4
# map ctrl+t>5 goto_tab 5
# map ctrl+t>6 goto_tab 6
# map ctrl+t>7 goto_tab 7
# map ctrl+t>8 goto_tab 8
# map ctrl+t>9 goto_tab 9

# ===== Window & Decorations =====
hide_window_decorations no
window_padding_width 5

# 关闭 OS 窗口或标签前弹出确认对话框，避免误关
# -1: 即使只有一个窗口/标签也会询问；正数 N 表示有 N 个以上 kitten 在运行时才询问
confirm_os_window_close -1

# 窗口边框设置（已关闭）
# window_border_width 1
# active_border_color #50fa7b
# inactive_border_color #6272a4
# draw_minimal_borders yes

# ===== Custom Title Bar (Tab Bar) =====
tab_bar_edge bottom
tab_bar_style powerline
tab_separator " │ "
tab_title_template "  {title}  "
tab_bar_background #000000

# Active tab: 反白显示 (black foreground on white background)
active_tab_foreground   #000000
active_tab_background   #ffffff
active_tab_font_style   bold

# Inactive tab: Dark gray foreground, medium gray background
inactive_tab_foreground #808080
inactive_tab_background #3a3a3a
inactive_tab_font_style normal 

repaint_delay 10
input_delay 0


# ===== Advanced Features =====
allow_remote_control yes
listen_on unix:/tmp/mykitty

# # Hints Kitten: Press Alt+p to select a URL from screen and open it
# map alt+p kitten hints --type url
#
# # Hints Kitten: Press Alt+f to select a path from screen and open it with nvim
# map alt+f kitten hints --type path --program nvim
#
# # Hints Kitten: Press Alt+l to select a line and copy it to clipboard
# map alt+l kitten hints --type line --program @

# ===== Window Management Shortcuts =====
map f11 toggle_fullscreen
map ctrl+shift+m toggle_maximized
map ctrl+shift+i minimize_window

# Window resizing with keyboard (Ctrl+Shift+Arrows)
map ctrl+shift+left resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter

# BEGIN_KITTY_THEME
# 3024 Night
include current-theme.conf
# END_KITTY_THEME
