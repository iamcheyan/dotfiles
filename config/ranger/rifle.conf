# ranger rifle config
# Open text files with LazyVim (nvim)

# Text files
ext text? = nvim "$@"

# Specific text formats
ext csv?|tsv?|json?|yaml?|yml?|toml?|xml?|ini?|conf?|cfg?|rc? = nvim "$@"

# Programming languages
ext c|h|cpp|hpp|cc|cxx = nvim "$@"
ext py|pyw = nvim "$@"
ext js|ts|jsx|tsx|vue|svelte = nvim "$@"
ext sh|bash|zsh|fish = nvim "$@"
ext rb|erb = nvim "$@"
ext go = nvim "$@"
ext rs = nvim "$@"
ext java = nvim "$@"
ext php = nvim "$@"

# Config and doc files
ext md|rst|txt|log = nvim "$@"
ext gitignore|gitconfig|editorconfig = nvim "$@"

# Fallback for text files
mime text = nvim "$@"
