[general]
refresh_interval = 30
default_shell = "/bin/bash"
ssh_command = "ssh"
max_concurrent_connections = 10

[ui]
theme = "default"
show_ip = true
show_uptime = true
card_layout = "grid"
border_style = "rounded"

[keybindings]
quit = "q"
search = "/"
connect = "Enter"
dashboard = "1"
file_manager = "2"
snippets = "3"
