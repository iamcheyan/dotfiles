"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 2500

format = """
$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$java$package$docker_context$kubernetes$aws$terraform$time
$character"""

right_format = """$status$cmd_duration$jobs"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❯](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #50fa7b"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "[+${count}](bold green)"
modified = "[~${count}](bold yellow)"
untracked = "[?${count}](bold red)"
deleted = "[-${count}](bold red)"
stashed = "[*${count}](bold blue)"

[python]
symbol = " "
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )](bold yellow)'
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"

[java]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold blue"

[package]
symbol = "󰏗 "
format = "[$symbol$version]($style) "
style = "bold 208"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "bold blue"

[kubernetes]
symbol = "󱃾 "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold cyan"
disabled = false

[aws]
symbol = " "
format = '[$symbol($profile )(\\($region\\) )]($style)'
style = "bold yellow"
disabled = false

[terraform]
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "
style = "bold purple"

[status]
disabled = false
symbol = " "
style = "bold red"

[cmd_duration]
min_time = 2_000
format = "[$duration](bold yellow) "

[jobs]
symbol = "󰒋 "
style = "bold blue"

[time]
disabled = false
format = "at [$time]($style) "
time_format = "%H:%M"
style = "#ffffff"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold red"
disabled = false
