alias ze="zellij"
_ZELLIJ_ALIAS_CONFIG="${${(%):-%x}:A}"

zem() {
  local color_reset="" color_label="" color_value="" color_warn="" color_dim=""
  if [[ -t 1 && -z "$NO_COLOR" ]]; then
    color_reset=$'\e[0m'
    color_label=$'\e[1;34m'
    color_value=$'\e[36m'
    color_warn=$'\e[33m'
    color_dim=$'\e[2m'
  fi

  # 修复 Ghostty 终端兼容性（zellij 0.43.1 对 xterm-ghostty 会 panic）
  if [[ "$TERM" == "xterm-ghostty" ]]; then
    export TERM=xterm-256color
  fi

  # 禁止在 zellij 内部嵌套执行
  if [[ -n "$ZELLIJ" ]]; then
    printf '%s[zem warning]%s Cannot run inside a zellij session. Current session: %s%s%s\n' \
      "$color_warn" "$color_reset" "$color_value" "${ZELLIJ_SESSION_NAME:-zellij}" "$color_reset"
    printf '%sUse Ctrl+o d to detach first.%s\n' "$color_dim" "$color_reset"
    return 1
  fi

  local session
  session="$(whoami)@$(hostname)"

  local zellij_bin
  zellij_bin="$(command -v zellij)"

  printf '%s[zem]%s config=%s%s%s\n' "$color_label" "$color_reset" "$color_value" "$_ZELLIJ_ALIAS_CONFIG" "$color_reset"
  printf '%s[zem]%s TERM=%s%s%s\n' "$color_label" "$color_reset" "$color_value" "$TERM" "$color_reset"
  printf '%s[zem]%s session=%s%s%s\n' "$color_label" "$color_reset" "$color_value" "$session" "$color_reset"
  printf '%s[zem]%s binary=%s%s%s\n' "$color_label" "$color_reset" "$color_value" "$zellij_bin" "$color_reset"
  printf '%s[zem]%s sessions:\n' "$color_label" "$color_reset"
  timeout 2 "$zellij_bin" ls --no-formatting 2>/dev/null ||
    printf '%s(timeout or error)%s\n' "$color_warn" "$color_reset"
  printf '%s----------------------------------------%s\n' "$color_dim" "$color_reset"

  local config_dir="${XDG_CACHE_HOME:-$HOME/.cache}/zem-zellij"

  # 等待 zellij daemon 就绪（重启后可能需要几秒）
  local _try=0
  while ! timeout 1 "$zellij_bin" ls --no-formatting >/dev/null 2>&1 && ((_try < 5)); do
    sleep 1
    _try=$((_try + 1))
  done
  printf '%s[zem]%s daemon_ready after %ss%s\n' "$color_label" "$color_reset" "$_try" "$color_reset"

  # 查找同名会话（活跃或 EXITED）
  local existing
  existing=$(timeout 2 "$zellij_bin" ls --no-formatting 2>/dev/null | awk -v s="$session" '$1 == s {print; exit}')
  printf '%s[zem]%s matched=%s%s%s\n' \
    "$color_label" "$color_reset" "$color_value" "${existing:-none}" "$color_reset"

  if [[ -n "$existing" ]]; then
    if [[ "$existing" != *"(EXITED"* ]]; then
      # 活跃会话：直接附加
      "$zellij_bin" --config-dir "$config_dir" attach "$session"
      return
    fi
    # EXITED 状态：-f 会自动从序列化缓存恢复（不要 kill-session，否则缓存可能被清除）
  fi

  # 检查序列化缓存是否存在（跨重启持久化）
  local zj_ver cache_info=""
  zj_ver=$("$zellij_bin" --version 2>/dev/null | awk '{print $NF}')
  local cache_base="${HOME}/Library/Caches/org.Zellij-Contributors.Zellij"
  [[ -d "$cache_base/$zj_ver/session_info/$session" ]] && cache_info="found"

  # Linux 缓存路径
  if [[ -z "$cache_info" ]]; then
    local linux_cache="${XDG_CACHE_HOME:-$HOME/.cache}/zellij"
    [[ -d "$linux_cache/$zj_ver/session_info/$session" ]] && cache_info="found"
  fi

  printf '%s[zem]%s cache=%s%s%s\n' \
    "$color_label" "$color_reset" "$color_value" "${cache_info:-none}" "$color_reset"

  # 创建新会话
  # 注意: zellij 0.43.1 的 -s 和 -l 同时使用会失败，只用 -s 创建会话
  mkdir -p "$config_dir/layouts"
  cat > "$config_dir/layouts/default.kdl" <<'EOF'
layout {
    default_tab_template {
        children
        pane size=1 borderless=true {
            plugin location="zellij-cb" {
                DisplaySessionDirectory "false"
                DefaultTabName "tab"
                BgColor "0,255,0"
                FgColor "0"
                SessionDirectoryColor "0"
                SessionNameColor "0"
                TabColor "0"
                ActiveTabColor "0"
                NormalModeColor "0"
                OtherModesColor "0"
                OthersColor "0"
                LockedModeLabel ""
                NormalModeLabel ""
                ResizeModeLabel "R"
                PaneModeLabel "P"
                TabModeLabel "T"
                ScrollModeLabel "S"
                SearchModeLabel "/"
                EnterSearchModeLabel "/"
                RenameTabModeLabel "RT"
                RenamePaneModeLabel "RP"
                SessionModeLabel "O"
                MoveModeLabel "M"
                TmuxModeLabel "B"
            }
        }
    }
    tab name="main"
}
EOF
  cat > "$config_dir/config.kdl" <<EOF
theme_dir "$HOME/.config/zellij/themes"
theme "tmux-color"
plugins {
    tab-bar location="zellij:tab-bar"
    zellij-cb location="file:~/.config/zellij/plugins/zellij-cb.wasm"
}
default_layout "default"
session_serialization true
serialize_pane_viewport true
scrollback_lines_to_serialize 5000
serialization_interval 30
disable_session_metadata false
keybindings {
    session {
        bind "Ctrl o" { SwitchToMode "Normal"; }
        bind "d" { Detach; }
        bind "x" { Quit; }
    }
}
EOF

  # attach -c -f 会自动从序列化缓存恢复（如果 session_serialization=true 且缓存存在）
  "$zellij_bin" --config-dir "$config_dir" attach -c -f "$session"
}
# 原生 zellij：不加载任何自定义配置，纯粹默认
zjn() {
  local tmpdir=$(mktemp -d)
  mkdir -p "$tmpdir/layouts"
  : > "$tmpdir/config.kdl"
  zellij --config-dir "$tmpdir" "$@"
}
alias zetmp="zellij attach -c -f tmp options --default-layout compact"
zeclear() {
    local zellij_bin timeout_bin
    zellij_bin="$(command -v zellij)" || {
        echo "❌ zellij not found."
        return 1
    }
    timeout_bin="$(command -v timeout || command -v gtimeout || true)"

    _zeclear_timeout() {
        local seconds="$1"
        shift
        if [[ -n "$timeout_bin" ]]; then
            "$timeout_bin" "$seconds" "$@"
        else
            "$@"
        fi
    }

    echo "🧹 Force repairing zellij..."
    echo "  stopping zellij processes..."
    pkill -u "$USER" -x zellij 2>/dev/null || true
    sleep 0.5
    pkill -9 -u "$USER" -x zellij 2>/dev/null || true

    echo "  deleting zellij sessions..."
    _zeclear_timeout 5 "$zellij_bin" delete-all-sessions --yes --force >/dev/null 2>&1 || true

    echo "  clearing resurrect cache..."
    rm -rf "$HOME/Library/Caches/org.Zellij-Contributors.Zellij"/*/session_info 2>/dev/null || true
    rm -rf "${TMPDIR%/}/zellij-$(id -u)" 2>/dev/null || true

    if _zeclear_timeout 2 "$zellij_bin" ls --no-formatting >/dev/null 2>&1; then
        echo "✅ zellij command is responsive."
    else
        echo "⚠️  zellij still looks unresponsive."
        return 1
    fi

    echo "✅ zellij repaired and cleaned."
}
